# =============================================================
# CodeGuardian AI — Full Stack Docker Compose
# =============================================================
# Usage:
#   docker compose up --build        (first run / after code changes)
#   docker compose up -d             (detached mode)
#   docker compose down -v           (teardown + delete volumes)
#   docker compose ps                (check service health)
# =============================================================

services:

  # -----------------------------------------------------------
  # PostgreSQL — Persistent relational data store
  # -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: codeguardian-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codeguardian}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-codeguardian}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - codeguardian-network

  # -----------------------------------------------------------
  # Zookeeper — Required by Kafka for cluster coordination
  # -----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: codeguardian-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - codeguardian-network

  # -----------------------------------------------------------
  # Kafka — Asynchronous message broker for review jobs
  # -----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: codeguardian-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 | grep ApiVersion"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - codeguardian-network

  # -----------------------------------------------------------
  # Qdrant — Vector database for RAG codebase embeddings
  # -----------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: codeguardian-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "grep", "-q", ":18BD", "/proc/net/tcp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - codeguardian-network

  # -----------------------------------------------------------
  # Redis — Cache layer for future use (rate limiting, sessions)
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: codeguardian-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - codeguardian-network

  # -----------------------------------------------------------
  # CodeGuardian Spring Boot API
  # -----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codeguardian-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-codeguardian}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-codeguardian-codebase}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-change-me-in-production}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      GEMINI_TIMEOUT_MS: ${GEMINI_TIMEOUT_MS:-30000}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-3}
      GEMINI_BACKOFF_MS: ${GEMINI_BACKOFF_MS:-1000}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-mock-client-id}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-mock-client-secret}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:-default-secret-key-32-chars-length!!}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - codeguardian-network

  # -----------------------------------------------------------
  # React Dashboard — Metrics & Review Visualization UI
  # -----------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: codeguardian-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - codeguardian-network

# =============================================================
# Volumes — Persistent storage across restarts
# =============================================================
volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local

# =============================================================
# Networks — Isolated bridge network for inter-service comms
# =============================================================
networks:
  codeguardian-network:
    driver: bridge
