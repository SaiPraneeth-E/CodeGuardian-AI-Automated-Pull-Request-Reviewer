# Docker profile: overrides hostnames to Docker Compose service names
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/codeguardian
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  kafka:
    bootstrap-servers: kafka:29092
  flyway:
    enabled: true
    baseline-on-migrate: true

codeguardian:
  qdrant:
    host: qdrant
    port: 6334

# Expose actuator health endpoint for Docker health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
