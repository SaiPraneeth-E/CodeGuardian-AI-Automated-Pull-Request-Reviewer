spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: true
  sql:
    init:
      mode: never

codeguardian:
  github:
    webhook-secret: local-webhook-secret-key-12345
    token: ${GITHUB_TOKEN:mock-github-token-for-testing}
    api-url: ${GITHUB_API_URL:https://api.github.com}
  gemini:
    api-key: ${GEMINI_API_KEY:mock-api-key-for-unit-tests-123}
